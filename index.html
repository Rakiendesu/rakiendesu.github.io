<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=2.0, user-scalable=yes" />
    <title>Document</title>
    <style>
        .box {
            position: relative;
        }
        img {
            width: 170px;
            vertical-align: top;
            padding: 5px;
        }
</style>
</head>
<body>
    <div class="box">
        <img src="https://s2.loli.net/2023/05/12/7nP1QXzENodcaUk.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/12/txNXIZz5ElFw8sT.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/12/sCeWvoMwqdZErBS.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/cwVYfpTk3RszGm2.png" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/CSrBbkoEpz1Yxt5.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/SM8WGP21auvDZh6.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/12/7nP1QXzENodcaUk.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/12/txNXIZz5ElFw8sT.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/12/sCeWvoMwqdZErBS.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/cwVYfpTk3RszGm2.png" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/CSrBbkoEpz1Yxt5.jpg" alt="Image">
        <img src="https://s2.loli.net/2023/05/11/SM8WGP21auvDZh6.jpg" alt="Image">
    </div>
    
    
    <script src="js/jquery-1.11.3.min.js"></script>             <!-- jQuery (https://jquery.com/download/) -->
        <script src="js/imagesloaded.pkgd.min.js"></script> <!-- https://masonry.desandro.com/ -->
        <script src="js/masonry.pkgd.min.js"></script> <!-- https://masonry.desandro.com/ -->
    
    <script>
    $(function () {
        // 获取图片的宽度(200px)
        let imgWidth = $('img').outerWidth(); // 200

        waterfallHandler();

        // 瀑布流处理
        function waterfallHandler() {
            // 获取图片的列数
            let column = parseInt($(window).width() / imgWidth);

            // 高度数组
            let heightArr = [];
            for(let i=0; i<column; i++) {
                heightArr[i] = 0;
            }

            // 遍历所有图片进行定位处理
            $.each($('img'), function (index, item) {
                // 当前元素的高度
                let itemHeight = $(item).outerHeight();
                // 高度数组最小的高度
                let minHeight = Math.min(...heightArr);
                // 高度数组最小的高度的索引
                let minIndex = heightArr.indexOf(minHeight);

                $(item).css({
                    position: 'absolute',
                    top: minHeight + 'px',
                    left: minIndex * imgWidth + 'px'
                });

                heightArr[minIndex] += itemHeight;
            });
        }

        // 窗口大小改变
        $(window).resize(function () {
            waterfallHandler();
        });
    });
</script>

    
</body>
</html>
